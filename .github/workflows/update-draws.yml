name: Update prize bond data files

on:
  schedule:
    # Run every Monday at 6:00 UTC — new draws are typically published
    # on government working days.
    - cron: "0 6 * * 1"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests

      - name: Download all result files
        run: python scripts/update_data.py

      - name: Commit and push new files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          if git diff --cached --quiet; then
            echo "No new files to commit."
          else
            git commit -m "Auto-update prize bond data files"
            git push
          fi
